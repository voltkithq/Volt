<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Volt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a2e;
      color: #e0e0e0;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #646cff;
      cursor: pointer;
      user-select: none;
    }
    h1:hover { opacity: 0.8; }
    p { font-size: 1.2rem; color: #888; }
    .version {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello from Volt!</h1>
    <p>Edit this file and see changes instantly.</p>
    <p class="version">Volt Framework v0.1.0</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
