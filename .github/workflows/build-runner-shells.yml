name: Build Pre-built Runner Binaries

# Runner shells are built as part of the Release workflow (release.yml).
# This workflow exists only for manual re-builds outside the release cycle.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.12)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        variant:
          - name: release
            features: prebuilt-shell
            suffix: ""
          - name: devtools
            features: prebuilt-shell,devtools
            suffix: "-devtools"
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: volt-runner.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: volt-runner.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: volt-runner
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: volt-runner
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: volt-runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: volt-runner

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation tools (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build runner shell binary (${{ matrix.variant.name }})
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p volt-runner --features ${{ matrix.variant.features }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename artifact and compute checksum
        shell: bash
        run: |
          SOURCE="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          EXT=""
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            EXT=".exe"
          fi
          DEST="volt-runner${{ matrix.variant.suffix }}-${{ matrix.target }}${EXT}"
          cp "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> "$GITHUB_ENV"

          if command -v sha256sum &>/dev/null; then
            sha256sum "$DEST" > "${DEST}.sha256"
          else
            shasum -a 256 "$DEST" > "${DEST}.sha256"
          fi

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARTIFACT_PATH }}" --clobber

      - name: Upload checksum
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARTIFACT_PATH }}.sha256" --clobber

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: volt-runner${{ matrix.variant.suffix }}-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.ARTIFACT_PATH }}.sha256

  checksums:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all checksum files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          mkdir checksums
          cd checksums
          for asset in $(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name' | grep '\.sha256$'); do
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$asset" --dir .
            cat "$asset" >> volt-runner-checksums.sha256
          done

      - name: Upload combined checksum manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" checksums/volt-runner-checksums.sha256 --clobber --repo "${{ github.repository }}"
