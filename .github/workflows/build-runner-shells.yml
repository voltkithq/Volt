name: Build Pre-built Runner Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.12)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: volt-runner.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: volt-runner.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: volt-runner
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: volt-runner
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: volt-runner
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: volt-runner

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation tools (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build runner shell binary
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p volt-runner --features prebuilt-shell
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename artifact and compute checksum
        shell: bash
        run: |
          SOURCE="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          EXT=""
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            EXT=".exe"
          fi
          DEST="volt-runner-${{ matrix.target }}${EXT}"
          cp "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$DEST" >> "$GITHUB_ENV"

          # Compute SHA-256 checksum
          if command -v sha256sum &>/dev/null; then
            sha256sum "$DEST" > "${DEST}.sha256"
          else
            shasum -a 256 "$DEST" > "${DEST}.sha256"
          fi

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARTIFACT_PATH }}" --clobber

      - name: Upload checksum
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARTIFACT_PATH }}.sha256" --clobber

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: volt-runner-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.ARTIFACT_PATH }}.sha256

  checksums:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all checksum files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          mkdir checksums
          cd checksums
          # Download individual checksum files and merge into one manifest
          for asset in $(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name' | grep '\.sha256$'); do
            gh release download "$TAG" --repo "${{ github.repository }}" --pattern "$asset" --dir .
            cat "$asset" >> volt-runner-checksums.sha256
          done

      - name: Upload combined checksum manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" checksums/volt-runner-checksums.sha256 --clobber --repo "${{ github.repository }}"
