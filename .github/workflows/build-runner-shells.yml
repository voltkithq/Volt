name: Build Pre-built Runner Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.12)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: volt-runner.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: volt-runner.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: volt-runner
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: volt-runner
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: volt-runner
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: volt-runner

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation tools (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build runner binary
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p volt-runner
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          EXT=""
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            EXT=".exe"
          fi
          DEST="volt-runner-${VERSION}-${{ matrix.target }}${EXT}"
          cp "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARTIFACT_PATH }}" --clobber

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: volt-runner-${{ matrix.target }}
          path: ${{ env.ARTIFACT_PATH }}
