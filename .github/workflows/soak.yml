name: Nightly Soak

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      iterations:
        description: Iterations per soak task
        required: false
        default: '10'

permissions:
  contents: read

concurrency:
  group: nightly-soak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  soak:
    name: Soak (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-soak-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          pnpm --filter voltkit run build
          pnpm --filter @voltkit/volt-cli run build

      - name: Run soak harness
        env:
          SOAK_ITERATIONS: ${{ github.event.inputs.iterations || '10' }}
          SOAK_WARMUP: 'true'
          SOAK_METRICS_FILE: artifacts/soak-metrics-${{ runner.os }}.json
          SOAK_TREND_FILE: artifacts/soak-trend-${{ runner.os }}.jsonl
          SOAK_REPORT_FILE: artifacts/soak-report-${{ runner.os }}.md
        run: node scripts/soak/nightly-soak.mjs

      - name: Upload soak metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: soak-metrics-${{ matrix.os }}
          path: |
            artifacts/soak-metrics-${{ runner.os }}.json
            artifacts/soak-trend-${{ runner.os }}.jsonl
            artifacts/soak-report-${{ runner.os }}.md
          retention-days: 30
          if-no-files-found: warn
