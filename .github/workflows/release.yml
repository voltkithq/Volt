name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    name: Build - ${{ matrix.settings.target }}
    needs: quality-gates
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              sudo apt-get update
              sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev
              pnpm --filter @voltkit/volt-native run build --target x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm --filter @voltkit/volt-native run build --target x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
            build: pnpm --filter @voltkit/volt-native run build --target x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            build: pnpm --filter @voltkit/volt-native run build --target aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.settings.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.settings.target }}-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binary
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/volt-napi/*.node
          if-no-files-found: error

  runner-shells:
    name: Runner Shell - ${{ matrix.target }} (${{ matrix.variant.name }})
    needs: quality-gates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        variant:
          - name: release
            features: prebuilt-shell
            suffix: ""
          - name: devtools
            features: prebuilt-shell,devtools
            suffix: "-devtools"
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: volt-runner.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: volt-runner.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: volt-runner
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: volt-runner
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: volt-runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: volt-runner
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies (x64)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install Linux system dependencies (ARM64 native)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-runner-${{ matrix.target }}-${{ matrix.variant.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-runner-${{ matrix.target }}-${{ matrix.variant.name }}-

      - name: Build runner shell binary (${{ matrix.variant.name }})
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p volt-runner --features ${{ matrix.variant.features }}

      - name: Rename artifact and compute checksum
        shell: bash
        run: |
          SOURCE="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          EXT=""
          if [[ "${{ matrix.artifact }}" == *.exe ]]; then
            EXT=".exe"
          fi
          DEST="volt-runner${{ matrix.variant.suffix }}-${{ matrix.target }}${EXT}"
          cp "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> "$GITHUB_ENV"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$DEST" > "${DEST}.sha256"
          else
            shasum -a 256 "$DEST" > "${DEST}.sha256"
          fi

      - name: Upload runner artifact
        uses: actions/upload-artifact@v7
        with:
          name: runner-${{ matrix.variant.name }}-${{ matrix.target }}
          path: |
            ${{ env.ARTIFACT_PATH }}
            ${{ env.ARTIFACT_PATH }}.sha256

  upload-runners:
    name: Upload Runner Shells to Release
    needs: runner-shells
    runs-on: ubuntu-latest
    steps:
      - name: Download all runner artifacts
        uses: actions/download-artifact@v8
        with:
          path: runners
          pattern: runner-*

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Upload individual binaries and checksums
          for dir in runners/runner-*; do
            for file in "$dir"/*; do
              echo "Uploading $(basename "$file")..."
              gh release upload "$TAG" "$file" --clobber --repo "${{ github.repository }}"
            done
          done

          # Generate combined checksum manifest
          cat runners/runner-*/*.sha256 > volt-runner-checksums.sha256
          gh release upload "$TAG" volt-runner-checksums.sha256 --clobber --repo "${{ github.repository }}"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [quality-gates, build, upload-runners]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts to napi directory
        run: |
          ls -la artifacts/
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node crates/volt-napi/ 2>/dev/null || true
          done
          ls -la crates/volt-napi/*.node || echo "No .node files found"

      - name: Validate native npm tarball contains binaries
        run: |
          node <<'EOF'
          const { execSync } = require('node:child_process');
          const output = execSync('npm pack --dry-run --json', {
            cwd: 'crates/volt-napi',
            encoding: 'utf8',
          });
          const packEntries = JSON.parse(output);
          const files = (packEntries[0]?.files ?? []).map((entry) => entry.path);
          const nodeFiles = files.filter((path) => path.endsWith('.node'));

          if (nodeFiles.length === 0) {
            console.error('[release] @voltkit/volt-native tarball is missing .node artifacts.');
            process.exit(1);
          }

          console.log(`[release] Found ${nodeFiles.length} native artifact(s) in tarball:`);
          for (const file of nodeFiles) {
            console.log(` - ${file}`);
          }
          EOF

      - name: Build TypeScript packages
        run: |
          pnpm --filter @voltkit/volt-test run build
          pnpm --filter voltkit run build
          pnpm --filter @voltkit/volt-cli run build
          pnpm --filter @voltkit/create-volt run build

      - name: Replace workspace references with real versions
        run: |
          VERSION=$(node -p "require('./packages/volt/package.json').version")
          echo "[release] Replacing workspace:* with ^${VERSION}"
          node -e "
            const fs = require('fs');
            const replacements = [
              'packages/volt/package.json',
              'packages/volt-cli/package.json',
            ];
            for (const file of replacements) {
              const content = fs.readFileSync(file, 'utf8');
              const updated = content.replace(/\"workspace:\\*\"/g, JSON.stringify('^' + '${VERSION}'));
              fs.writeFileSync(file, updated);
              console.log('  Updated', file);
            }
          "

      - name: Publish npm packages (retry + propagation delay)
        shell: bash
        run: |
          set -euo pipefail

          publish_with_retry() {
            local dir="$1"
            local label="$2"
            local attempts=3
            local attempt=1
            while [ "$attempt" -le "$attempts" ]; do
              echo "[release] Publishing ${label} (attempt ${attempt}/${attempts})"
              local output
              if output=$(cd "$dir" && npm publish --provenance --access public 2>&1); then
                return 0
              fi
              if echo "$output" | grep -q "You cannot publish over the previously published versions"; then
                echo "[release] ${label} already published, skipping."
                return 0
              fi
              if [ "$attempt" -lt "$attempts" ]; then
                local delay=$((attempt * 20))
                echo "[release] Publish failed for ${label}; retrying in ${delay}s..."
                echo "$output"
                sleep "$delay"
              fi
              attempt=$((attempt + 1))
            done
            echo "[release] Failed to publish ${label} after ${attempts} attempts."
            return 1
          }

          publish_with_retry crates/volt-napi @voltkit/volt-native
          sleep 20
          publish_with_retry packages/volt-test @voltkit/volt-test
          sleep 20
          publish_with_retry packages/volt voltkit
          sleep 20
          publish_with_retry packages/volt-cli @voltkit/volt-cli
          sleep 20
          publish_with_retry packages/create-volt @voltkit/create-volt
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
