name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  build:
    name: Build - ${{ matrix.settings.target }}
    needs: quality-gates
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              sudo apt-get update
              sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
              pnpm --filter @voltkit/volt-native run build --target x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm --filter @voltkit/volt-native run build --target x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.settings.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.settings.target }}-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binary
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/volt-napi/*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [quality-gates, build]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts to napi directory
        run: |
          ls -la artifacts/
          for dir in artifacts/bindings-*; do
            cp "$dir"/*.node crates/volt-napi/ 2>/dev/null || true
          done
          ls -la crates/volt-napi/*.node || echo "No .node files found"

      - name: Validate native npm tarball contains binaries
        run: |
          node <<'EOF'
          const { execSync } = require('node:child_process');
          const output = execSync('npm pack --dry-run --json', {
            cwd: 'crates/volt-napi',
            encoding: 'utf8',
          });
          const packEntries = JSON.parse(output);
          const files = (packEntries[0]?.files ?? []).map((entry) => entry.path);
          const nodeFiles = files.filter((path) => path.endsWith('.node'));

          if (nodeFiles.length === 0) {
            console.error('[release] @voltkit/volt-native tarball is missing .node artifacts.');
            process.exit(1);
          }

          console.log(`[release] Found ${nodeFiles.length} native artifact(s) in tarball:`);
          for (const file of nodeFiles) {
            console.log(` - ${file}`);
          }
          EOF

      - name: Build TypeScript packages
        run: |
          pnpm --filter voltkit run build
          pnpm --filter @voltkit/volt-cli run build
          pnpm --filter @voltkit/create-volt run build

      - name: Publish npm packages (retry + propagation delay)
        shell: bash
        run: |
          set -euo pipefail

          publish_with_retry() {
            local dir="$1"
            local label="$2"
            local attempts=3
            local attempt=1
            while [ "$attempt" -le "$attempts" ]; do
              echo "[release] Publishing ${label} (attempt ${attempt}/${attempts})"
              if (cd "$dir" && npm publish --provenance --access public); then
                return 0
              fi
              if [ "$attempt" -lt "$attempts" ]; then
                local delay=$((attempt * 20))
                echo "[release] Publish failed for ${label}; retrying in ${delay}s..."
                sleep "$delay"
              fi
              attempt=$((attempt + 1))
            done
            echo "[release] Failed to publish ${label} after ${attempts} attempts."
            return 1
          }

          publish_with_retry crates/volt-napi @voltkit/volt-native
          sleep 20
          publish_with_retry packages/volt voltkit
          sleep 20
          publish_with_retry packages/volt-cli @voltkit/volt-cli
          sleep 20
          publish_with_retry packages/create-volt @voltkit/create-volt
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
